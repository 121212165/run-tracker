name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'test-report.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: '🌐 部署文档'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: 准备部署内容
        run: |
          mkdir -p _site
          # 复制测试计划文档
          if [ -d "docs" ]; then
            cp -r docs/* _site/
          fi
          # 复制测试报告
          if [ -f "test-report.md" ]; then
            cp test-report.md _site/
          fi
          # 创建主页 index.html（如果没有）
          if [ ! -f "_site/index.html" ]; then
            cp docs/test-plan.html _site/index.html 2>/dev/null || true
          fi
          echo "Deploy directory content:"
          ls -la _site/

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
