name: RunTracker CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deploy environment'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  HARMONYOS_SDK_HOME: /opt/harmonyos/sdk
  NODE_VERSION: '22'

jobs:
  lint:
    name: 'Code Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check file structure
        run: |
          echo "=== Module distribution ==="
          echo "common: $(find ./common -name '*.ets' 2>/dev/null | wc -l) files"
          echo "entry:  $(find ./entry -name '*.ets' 2>/dev/null | wc -l) files"
          echo ""
          echo "=== Test files ==="
          find . -name "*.test.ets" | sort

      - name: Check design token usage
        run: |
          echo "=== Theme imports ==="
          grep -rn "import.*Theme" --include="*.ets" || echo "No Theme imports"
          echo ""
          echo "=== Brand color consistency ==="
          grep -rn "#E8453C" --include="*.ets"

  build:
    name: 'Build'
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [entry, common]
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build ${{ matrix.module }}
        run: |
          echo "Building ${{ matrix.module }} module..."
          if [ -f "hvigorw" ]; then
            chmod +x hvigorw
            ./hvigorw assembleHap --mode module -p module=${{ matrix.module }}@default || echo "Skipped (no SDK)"
          else
            echo "Skipped: hvigorw not present"
          fi

  test:
    name: 'Test'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify test structure
        run: |
          echo "=== Test files ==="
          find . -name "*.test.ets" -type f | sort
          echo ""
          echo "=== Test case count ==="
          test_count=$(grep -rn "it(" --include="*.test.ets" | wc -l)
          echo "Total cases: $test_count"

      - name: Verify source files
        run: |
          find . -name "*.ets" -type f | while read f; do
            lines=$(wc -l < "$f")
            echo "  $f: $lines lines"
          done

  release:
    name: 'Release'
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          DATE=$(date +'%Y%m%d')
          COUNT=$(git rev-list --count HEAD)
          echo "version=v1.0.${COUNT}-${DATE}" >> $GITHUB_OUTPUT
          echo "tag=v1.0.${COUNT}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
